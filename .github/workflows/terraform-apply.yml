name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/terraform*.yml"

concurrency:
  group: terraform-apply-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false   # never cancel an in-flight apply

env:
  TF_ENV: ${{ inputs.environment || 'dev' }}

jobs:
  # ── Job 1: Validate & Security Scan ────────────────────────────────────────
  validate:
    name: Validate & Security Scan — ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: environments/${{ env.TF_ENV }}
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: environments/${{ env.TF_ENV }}
        run: terraform validate

      - name: IaC Security Scan (Checkov)
        run: |
          pip install checkov --quiet
          checkov -d . --framework terraform --soft-fail --compact --output cli

  # ── Job 2: Plan ─────────────────────────────────────────────────────────────
  plan:
    name: Plan — ${{ inputs.environment || 'dev' }}
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: environments/${{ env.TF_ENV }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        continue-on-error: true
        working-directory: environments/${{ env.TF_ENV }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_github_pat:  ${{ secrets.TF_VAR_GITHUB_PAT }}
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt

      - name: Publish plan to Job Summary
        if: always()
        run: |
          {
            echo "## Terraform Plan — ${{ env.TF_ENV }}"
            echo '```hcl'
            tail -n 150 environments/${{ env.TF_ENV }}/plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.TF_ENV }}-${{ github.run_id }}
          path: environments/${{ env.TF_ENV }}/tfplan
          retention-days: 3

      - name: Fail if plan failed
        if: steps.plan.outcome != 'success'
        run: exit 1

  # ── Job 3: Apply (production requires manual approval) ──────────────────────
  #
  # Gate: configure the "production" GitHub Environment with required reviewers
  # at Settings → Environments → production → Required reviewers.
  # Reviewers are notified and can inspect the Plan job summary before approving.
  # The exact plan artifact that was reviewed is what gets applied — no drift.
  #
  apply:
    name: Apply — ${{ inputs.environment || 'dev' }}
    needs: [plan]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'production' || inputs.environment || 'dev' }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false   # required: wrapper breaks `terraform output -raw`

      - name: Terraform Init
        working-directory: environments/${{ env.TF_ENV }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.TF_ENV }}-${{ github.run_id }}
          path: environments/${{ env.TF_ENV }}

      - name: Terraform Apply
        working-directory: environments/${{ env.TF_ENV }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_github_pat:  ${{ secrets.TF_VAR_GITHUB_PAT }}
        run: terraform apply -auto-approve tfplan

      # ── Bootstrap: write infra values so ArgoCD can deploy Ingress ──────────
      - name: Generate values-infra.yaml from Terraform outputs
        working-directory: environments/${{ env.TF_ENV }}
        run: |
          set -euo pipefail
          CERT_ARN=$(terraform output -raw acm_certificate_arn)
          ALB_SG_ID=$(terraform output -raw alb_sg_id)
          HOSTED_ZONE_ID=$(terraform output -raw hosted_zone_id)
          SFN_ARN=$(terraform output -raw step_functions_arn)
          EFS_ID=$(terraform output -raw efs_id)
          EFS_AP_ID=$(terraform output -raw efs_access_point_id)

          cat > /tmp/values-infra.yaml <<EOF
          # Auto-generated by GitHub Actions after terraform apply.
          # DO NOT EDIT MANUALLY — overwritten on every apply.
          # Allowed: infrastructure identifiers (ARNs, IDs) only.
          # Forbidden: passwords, JWT secrets, API keys — those stay in Secrets Manager.
          certArn: "${CERT_ARN}"
          albSgId: "${ALB_SG_ID}"
          hostedZoneId: "${HOSTED_ZONE_ID}"
          sfnArn: "${SFN_ARN}"
          efsId: "${EFS_ID}"
          efsAccessPointId: "${EFS_AP_ID}"
          EOF

      - name: Generate GitHub App token for deployments repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: fleetops-deployments

      - name: Checkout deployments repo
        uses: actions/checkout@v4
        with:
          repository: FleetOps-V2/fleetops-deployments
          path: fleetops-deployments
          token: ${{ steps.app-token.outputs.token }}

      - name: Commit and push values-infra.yaml
        run: |
          mkdir -p fleetops-deployments/environments/${{ env.TF_ENV }}
          cp /tmp/values-infra.yaml fleetops-deployments/environments/${{ env.TF_ENV }}/infra-values.yaml
          cd fleetops-deployments
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/${{ env.TF_ENV }}/infra-values.yaml
          git diff --cached --quiet || git commit -m "chore(${{ env.TF_ENV }}): update ingress infra values from terraform [skip ci]"
          git push origin HEAD

      # ── Mirror operator images that ghcr.io pull-through cache can't fetch ──
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Mirror external-secrets image to ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR="${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"
          GHCR_IMAGE="ghcr.io/external-secrets/external-secrets:v0.9.19"
          ECR_IMAGE="${ECR}/external-secrets:v0.9.19"

          if aws ecr describe-images --repository-name external-secrets \
              --image-ids imageTag=v0.9.19 --region us-east-1 >/dev/null 2>&1; then
            echo "Image already in ECR, skipping mirror"
          else
            docker pull "$GHCR_IMAGE"
            docker tag  "$GHCR_IMAGE" "$ECR_IMAGE"
            docker push "$ECR_IMAGE"
            echo "Mirrored $GHCR_IMAGE → $ECR_IMAGE"
          fi

      - name: Print key outputs
        working-directory: environments/${{ env.TF_ENV }}
        run: |
          echo "=== GitHub Secrets to configure ==="
          echo "AWS_ROLE_ARN (infra repo):        $(terraform output -raw github_actions_role_arn)"
          echo "AWS_ECR_ROLE_ARN (service repos): $(terraform output -raw github_actions_ecr_role_arn)"
          echo "devops_agent_role_arn:             $(terraform output -raw devops_agent_role_arn)"
