name: Terraform Plan (PR Check)

on:
  pull_request:
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/terraform*.yml"

concurrency:
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write   # post plan as PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: true

      - name: Detect changed environment
        id: env
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^environments/prod/'; then
            echo "dir=prod" >> "$GITHUB_OUTPUT"
          else
            echo "dir=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Init
        working-directory: environments/${{ steps.env.outputs.dir }}
        run: terraform init

      - name: Terraform Validate
        working-directory: environments/${{ steps.env.outputs.dir }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: environments/${{ steps.env.outputs.dir }}
        env:
          TF_VAR_db_password:   ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret:    ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_db_username:   ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_github_pat:    ${{ secrets.TF_VAR_GITHUB_PAT }}
          TF_VAR_alert_emails:  '["${{ secrets.EMAIL_TO }}"]'
        run: |
          set +e
          terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(`environments/${{ steps.env.outputs.dir }}/plan.txt`, 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Fail if plan failed
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1
