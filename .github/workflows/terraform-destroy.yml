name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to destroy"
        required: true
        default: "dev"
        type: choice
        options: [dev]
      confirm:
        description: "Type DESTROY to confirm"
        required: true

concurrency:
  group: terraform-apply-${{ inputs.environment }}
  cancel-in-progress: false   # never interrupt an in-flight apply/destroy

jobs:
  destroy:
    name: Terraform Destroy — ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: ${{ inputs.confirm == 'DESTROY' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Destroy
        working-directory: environments/dev
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_github_pat:  ${{ secrets.TF_VAR_GITHUB_PAT }}
        run: terraform destroy -auto-approve
